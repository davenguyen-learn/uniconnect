services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uniconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uniconnect_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-uniconnect}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uniconnect}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      target: app
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
